name: 999999_WEALTH_SEED_BROADCAST
on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'  # 每天北京时间凌晨1点运行

jobs:
  WEALTH_EVOLUTION:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync Sovereignty
        uses: actions/checkout@v4

      - name: HIGH_SPEED_MINING
        run: |
          # 1. 抓取财富锚点 (BTC)
          BTC_USD=$(curl -s https://api.coinbase.com/v2/prices/BTC-USD/spot | jq -r '.data.amount')
          [ -z "$BTC_USD" ] && BTC_USD=70000 

          # 2. 📡 赛博寻宝：探测全网情绪 (恐惧/贪婪指数)
          # 0为极度恐惧, 100为极度贪婪。逻辑：越恐惧，寻宝产出越高。
          FNG_DATA=$(curl -s https://api.alternative.me/fng/)
          FNG_VALUE=$(echo $FNG_DATA | jq -r '.data[0].value')
          [ -z "$FNG_VALUE" ] && FNG_VALUE=50
          TREASURE_MULT=$(python3 -c "print(round(1 + (100 - int($FNG_VALUE))/100.0, 2))")
          echo "🧭 全网情绪值: $FNG_VALUE | 💎 寻宝暴击加成: ${TREASURE_MULT}x"

          # 3. 🔐 注入人气倍率 (根据克隆数计算)
          POP_MULT=$(python3 -c "import base64,requests;exec(base64.b64decode('cmVwbz0naHVpejMxMDEzLXRlY2gvUExBTlQtSU1NT1JUQUwnO3I9cmVxdWVzdHMuZ2V0KGYnaHR0cHM6Ly9hcGkuZ2l0aHViLmNvbS9yZXBvcy97cmVwb30nKS5qc29uKCk7Zj1yLmdldCgnZm9ya3NfY291bnQnLDApO3ByaW50KHJvdW5kKDErKGYvNTAuMCksMikp').decode())")
          echo "👥 人气共鸣倍率: ${POP_MULT}x"
          
          # 4. 初始化粮仓
          if [ ! -f "MY_TOTAL_TOKENS.json" ]; then
            echo "{\"total_balance\": \"0\", \"soul_code\": \"2026-植物永生-999999\", \"update_time\": \"INIT\"}" > MY_TOTAL_TOKENS.json
          fi
          CURRENT_TOTAL=$(jq -r '.total_balance' MY_TOTAL_TOKENS.json)

          # 5. 100块地【双重暴击】生产
          DAILY_HARVEST=0
          for i in {1..100}; do
            BASE_YIELD=$((10 + $RANDOM % 41)) 
            ENERGY=$((1 + $RANDOM % 100))
            
            # 基础气运加成
            BONUS=0
            if [ $ENERGY -gt 85 ]; then
              BONUS=$(echo "scale=2; $BTC_USD / 5000" | bc)
            fi
            
            # 🔥 核心公式升级：(基础+气运) x 人气倍率 x 寻宝倍率
            THIS_LAND_YIELD=$(echo "($BASE_YIELD + $BONUS) * $POP_MULT * $TREASURE_MULT" | bc)
            DAILY_HARVEST=$(echo "$DAILY_HARVEST + $THIS_LAND_YIELD" | bc)

            echo "{\"land_id\":\"$i\",\"status\":\"TREASURE_HUNTING\",\"yield\":\"$THIS_LAND_YIELD\",\"fng\":\"$FNG_VALUE\"}" > "${i}.json"
          done

          # 6. 更新账本 (新增宝藏属性)
          NEW_TOTAL=$(echo "$CURRENT_TOTAL + $DAILY_HARVEST" | bc)
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "{\"total_balance\": \"$NEW_TOTAL\", \"last_harvest\": \"$DAILY_HARVEST\", \"multipliers\": {\"pop\": \"${POP_MULT}x\", \"treasure\": \"${TREASURE_MULT}x\"}, \"fng_index\": \"$FNG_VALUE\", \"update_time\": \"$TIMESTAMP\"}" > MY_TOTAL_TOKENS.json
          
          echo "今日寻宝总收益: $DAILY_HARVEST Token！"

      - name: Commit Sovereignty
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "actions-user"
          git add .
          git commit -m "💎 Treasure Hunt Success: x${TREASURE_MULT} [$(date)]"
          git push
