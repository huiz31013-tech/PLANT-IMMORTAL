name: Cyber China Weather (Offline Mode)

on:
  schedule:
    - cron: '0 16 * * *' 
  workflow_dispatch:

jobs:
  grow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cyber Weather Generation
        run: |
          # 1. 模拟中国城市
          CITIES=("北京" "上海" "广州" "成都" "深圳" "杭州" "重庆" "武汉")
          CITY=${CITIES[$RANDOM % ${#CITIES[@]}]}
          
          # 2. 模拟天气逻辑（概率：60%晴，20%雨，10%雪，10%雷暴变异）
          RAND=$((RANDOM % 100))
          if [ $RAND -lt 60 ]; then
            W="晴朗 (Sunny)"
            COEFF=1.001
          elif [ $RAND -lt 80 ]; then
            W="细雨 (Rain)"
            COEFF=1.0012
          elif [ $RAND -lt 90 ]; then
            W="瑞雪 (Snow)"
            COEFF=1.0015
          else
            W="雷阵雨 (Thunderstorm - MUTATION)" # 触发变异！
            COEFF=1.0025
          fi
          
          echo "CITY=$CITY" >> $GITHUB_ENV
          echo "WEATHER=$W" >> $GITHUB_ENV
          echo "COEFF=$COEFF" >> $GITHUB_ENV

      - name: Apply Growth to 100 Lands
        run: |
          # 遍历更新JSON
          for i in {1..100}
          do
            FILE="${i}.json"
            if [ -f "$FILE" ]; then
              # 获取当前值，如果没这个字段就给个初始值
              OLD_VAL=$(jq -r '.growth.vibration // "0.0031013"' "$FILE")
              
              # 计算新值 (使用 awk 代替 bc，更稳)
              NEW_VAL=$(awk "BEGIN {print $OLD_VAL * $COEFF}")
              
              # 写入 JSON
              jq --arg nv "$NEW_VAL" --arg w "$WEATHER" --arg c "$CITY" \
              '.growth.vibration = $nv | .environment.weather = $w | .environment.location = $c | .environment.last_update = "'"$(date)"'"' \
              "$FILE" > tmp.json && mv tmp.json "$FILE"
            fi
          done

      - name: Save to Land
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "actions-user"
          git add .
          git commit -m "Weather Cycle: $CITY - $WEATHER" || echo "No changes"
          git push
